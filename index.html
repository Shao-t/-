<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>旅遊共用記帳本</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --border: rgba(0,0,0,0.1);
    --text: #1a1a1a; --text-2: #666; --blue: #378ADD; --green: #1D9E75; --red: #E24B4A;
    --radius: 14px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111; --surface: #1e1e1e; --border: rgba(255,255,255,0.1); --text: #f0f0f0; --text-2: #aaa; }
  }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 30px; }
  .header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .user-tag { font-size: 12px; color: var(--blue); background: var(--bg); padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); cursor: pointer; }
  .content { padding: 16px; max-width: 600px; margin: 0 auto; }
  
  /* 數據面板 */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric { background: var(--surface); border-radius: var(--radius); padding: 12px; border: 0.5px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--text-2); margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: 600; }
  .settle-card { grid-column: span 2; background: #eef6ff; border: 1px dashed var(--blue); color: var(--blue); }

  /* 表單樣式 */
  .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 16px; padding: 16px; }
  .form-group { margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 6px; font-weight: 500; }
  .input-row { display: flex; gap: 8px; }
  input, select { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; }
  .currency-hint { font-size: 12px; color: var(--blue); margin-top: 4px; font-weight: 500; }
  .btn-primary { background: var(--blue); color: #fff; border: none; width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; margin-top: 8px; cursor: pointer; }
  
  /* 流水帳 */
  .log-item { display: flex; align-items: center; padding: 12px; border-bottom: 0.5px solid var(--border); background: var(--surface); }
  .log-info { flex: 1; }
  .log-name { font-size: 15px; font-weight: 500; }
  .log-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .log-amount { text-align: right; }
  .amt-twd { font-weight: 600; color: var(--text); }
  .amt-ori { font-size: 11px; color: var(--text-3); }
</style>
</head>
<body>

<div class="header">
  <h1>🌍 旅遊記帳</h1>
  <div id="user-display" class="user-tag" onclick="resetUserName()">設定名字...</div>
</div>

<div class="content">
  <div class="metric-grid">
    <div class="metric settle-card">
      <div class="metric-label">💰 結算摘要 (誰該給誰)</div>
      <div id="settle-summary" class="metric-value" style="font-size:16px;">計算中...</div>
    </div>
    <div class="metric"><div class="metric-label">我已支付 (總和)</div><div id="m-total-paid" class="metric-value">$0</div></div>
    <div class="metric"><div class="metric-label">我的實際支出</div><div id="m-my-spend" class="metric-value">$0</div></div>
  </div>

  <div class="card">
    <div class="form-group">
      <label>項目與幣別</label>
      <div class="input-row">
        <input id="inp-item" type="text" placeholder="輸入金額" style="flex:2" />
        <select id="inp-cur" style="flex:1" onchange="updateExchangeHint()">
          <option value="TWD">台幣 TWD</option>
          <option value="JPY">日幣 JPY</option>
          <option value="IDR">印尼盾 IDR</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>金額 (輸入原幣)</label>
      <input id="inp-amount" type="number" placeholder="輸入金額" inputmode="decimal" oninput="updateExchangeHint()" />
      <div id="exchange-hint" class="currency-hint"></div>
    </div>

    <div class="form-group">
      <label>誰付錢？ & 分帳方式</label>
      <div class="input-row">
        <select id="inp-payer">
          <option value="me">我付的</option>
          <option value="friend">朋友付的</option>
        </select>
        <select id="inp-split">
          <option value="half">兩人平分</option>
          <option value="all-me">算我的</option>
          <option value="all-friend">算朋友的</option>
        </select>
      </div>
    </div>

    <button class="btn-primary" onclick="addRecord()">新增旅遊支出</button>
  </div>

  <div id="log-body"></div>
</div>

<script>
// --- 設定區 ---
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz-y3Gx-jNEN85cL-r7v_urwFgW2-azGQ3XzBCOjplUNEY7o4IiDMfKvGjmc6mrFf_m/exec'; 
const PWA_SECRET = '289019';
const RATES = { TWD: 1, JPY: 0.215, IDR: 0.0021 }; // 可手動更新匯率

let records = JSON.parse(localStorage.getItem('pwa_travel_v1') || '[]');
let userName = localStorage.getItem('pwa_user_name') || '';

function updateExchangeHint() {
  const amt = parseFloat(document.getElementById('inp-amount').value) || 0;
  const cur = document.getElementById('inp-cur').value;
  const twd = Math.round(amt * RATES[cur]);
  document.getElementById('exchange-hint').innerText = cur === 'TWD' ? '' : `≈ 台幣 $${twd} (匯率 ${RATES[cur]})`;
}

function checkUser() {
  if (!userName) {
    userName = prompt("出國囉！請輸入你的名字：") || "旅人";
    localStorage.setItem('pwa_user_name', userName);
  }
  document.getElementById('user-display').innerText = `👤 ${userName}`;
}

function addRecord() {
  const item = document.getElementById('inp-item').value.trim();
  const oriAmt = parseFloat(document.getElementById('inp-amount').value);
  const cur = document.getElementById('inp-cur').value;
  const payer = document.getElementById('inp-payer').value;
  const split = document.getElementById('inp-split').value;

  if (!item || isNaN(oriAmt)) return;

  const twdAmt = +(oriAmt * RATES[cur]).toFixed(2);
  let shareMe = 0, shareFriend = 0;

  if (split === 'half') { shareMe = twdAmt / 2; shareFriend = twdAmt / 2; }
  else if (split === 'all-me') { shareMe = twdAmt; shareFriend = 0; }
  else { shareMe = 0; shareFriend = twdAmt; }

  const newRec = {
    id: Date.now(),
    date: new Date().toLocaleDateString(),
    item, cur, oriAmt, twdAmt, payer, split, shareMe, shareFriend,
    creator: userName
  };

  records.unshift(newRec);
  localStorage.setItem('pwa_travel_v1', JSON.stringify(records));
  syncToSheet(newRec);
  render();
  document.getElementById('inp-item').value = '';
  document.getElementById('inp-amount').value = '';
}

async function syncToSheet(r) {
  if (!GAS_URL) return;
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    body: JSON.stringify({ secret: PWA_SECRET, ...r, user: userName })
  });
}

function render() {
  checkUser();
  const logBody = document.getElementById('log-body');
  let myPaidSum = 0, mySpendSum = 0, friendOweMe = 0, meOweFriend = 0;

  logBody.innerHTML = records.map(r => {
    // 統計邏輯
    if (r.payer === 'me') {
      myPaidSum += r.twdAmt;
      mySpendSum += r.shareMe;
      friendOweMe += r.shareFriend;
    } else {
      mySpendSum += r.shareMe;
      meOweFriend += r.shareMe;
    }

    return `
      <div class="log-item">
        <div class="log-info">
          <div class="log-name">${r.item}</div>
          <div class="log-sub">${r.date} · ${r.payer==='me'?'我付':'朋友付'} · ${r.cur} ${r.oriAmt}</div>
        </div>
        <div class="log-amount">
          <div class="amt-twd">$${r.twdAmt}</div>
          <div class="amt-ori">${r.split==='half'?'平分':'獨付'}</div>
        </div>
      </div>
    `;
  }).join('');

  // 更新面板
  document.getElementById('m-total-paid').innerText = `$${Math.round(myPaidSum)}`;
  document.getElementById('m-my-spend').innerText = `$${Math.round(mySpendSum)}`;
  
  const diff = friendOweMe - meOweFriend;
  const settleSummary = document.getElementById('settle-summary');
  if (diff > 0) settleSummary.innerText = `朋友 應給予你 $${Math.round(diff)}`;
  else if (diff < 0) settleSummary.innerText = `你 應給予朋友 $${Math.round(Math.abs(diff))}`;
  else settleSummary.innerText = `帳目平衡中`;
}

function resetUserName() {
  localStorage.removeItem('pwa_user_name');
  userName = '';
  checkUser();
}

render();
</script>
</body>
</html>
