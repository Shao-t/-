<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>旅遊共用記帳本 Pro</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --border: rgba(0,0,0,0.1);
    --text: #1a1a1a; --text-2: #666; --blue: #378ADD; --green: #1D9E75; --red: #E24B4A;
    --radius: 14px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111; --surface: #1e1e1e; --border: rgba(255,255,255,0.1); --text: #f0f0f0; --text-2: #aaa; }
  }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 30px; }
  .header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .user-tag { font-size: 12px; color: var(--blue); background: var(--bg); padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); cursor: pointer; }
  .content { padding: 16px; max-width: 600px; margin: 0 auto; }
  
  /* 數據面板 */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric { background: var(--surface); border-radius: var(--radius); padding: 12px; border: 0.5px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--text-2); margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: 600; }
  .settle-card { grid-column: span 2; background: #eef6ff; border: 1px dashed var(--blue); color: var(--blue); }

  /* 表單與按鈕 */
  .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 16px; padding: 16px; }
  .form-group { margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 6px; font-weight: 500; }
  .input-row { display: flex; gap: 8px; }
  input, select { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; }
  .currency-hint { font-size: 12px; color: var(--blue); margin-top: 4px; font-weight: 500; }
  .btn-primary { background: var(--blue); color: #fff; border: none; width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; margin-top: 8px; cursor: pointer; }
  .btn-outline { background: none; border: 1px solid var(--blue); color: var(--blue); width: 100%; padding: 10px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
  .btn-outline:active { background: #eef6ff; }
  
  /* 流水帳 */
  .log-item { display: flex; align-items: center; padding: 12px; border-bottom: 0.5px solid var(--border); background: var(--surface); margin-bottom: 2px; }
  .log-info { flex: 1; }
  .log-name { font-size: 15px; font-weight: 500; }
  .log-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .log-amount { text-align: right; margin-right: 12px; }
  .amt-twd { font-weight: 600; color: var(--text); }
  .amt-ori { font-size: 11px; color: var(--text-2); }
  .btn-del { background: #fee; color: var(--red); border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>🌄 峇里島Chill到斷片團</h1>
  <div id="user-display" class="user-tag" onclick="resetUserName()">設定名字...</div>
</div>

<div class="content">
  <div class="metric-grid">
    <div class="metric settle-card">
      <div class="metric-label">💰 最終結算摘要 (淨額)</div>
      <div id="settle-summary" class="metric-value">計算中...</div>
    </div>
    <div class="metric"><div class="metric-label">我已墊付總額</div><div id="m-total-paid" class="metric-value">$0</div></div>
    <div class="metric"><div class="metric-label">我應負擔總額</div><div id="m-my-spend" class="metric-value">$0</div></div>
  </div>

  <div class="card">
    <div class="form-group">
      <label>日期與時間</label>
      <input id="inp-datetime" type="datetime-local" />
    </div>
    <div class="form-group">
      <label>消費項目</label>
      <input id="inp-item" type="text" placeholder="項目" />
    </div>
    <div class="form-group">
      <label>金額 (原幣)</label>
      <div class="input-row">
        <input id="inp-amount" type="number" placeholder="0.00" inputmode="decimal" oninput="updateExchangeHint()" style="flex:2" />
        <select id="inp-cur" style="flex:1" onchange="updateExchangeHint()">
          <option value="IDR">印尼盾 IDR</option>
          <option value="TWD">台幣 TWD</option>
          <option value="JPY">日幣 JPY</option>
          <option value="USD">美金 USD</option>
        </select>
      </div>
      <div id="exchange-hint" class="currency-hint"></div>
    </div>
    <div class="form-group">
      <label>支付與分帳</label>
      <div class="input-row">
        <select id="inp-payer">
          <option value="me">我支付的</option>
          <option value="friend">夥伴支付的</option>
        </select>
        <select id="inp-split">
          <option value="half">兩人平分</option>
          <option value="all-me">全算我的</option>
          <option value="all-friend">全算夥伴</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" onclick="addRecord()">新增記帳紀錄</button>
    <button class="btn-outline" onclick="exportToCSV()">📥 匯出 CSV 檔案 (Excel)</button>
  </div>

  <div id="log-body"></div>
</div>

<script>
const RATES = { TWD: 1, JPY: 0.215, IDR: 0.0021, USD: 32.5 }; 
let records = JSON.parse(localStorage.getItem('pwa_travel_v2') || '[]');
let userName = localStorage.getItem('pwa_user_name') || '';

function updateExchangeHint() {
  const amt = parseFloat(document.getElementById('inp-amount').value) || 0;
  const cur = document.getElementById('inp-cur').value;
  const twd = Math.round(amt * RATES[cur]);
  document.getElementById('exchange-hint').innerText = cur === 'TWD' ? '' : `≈ 台幣 $${twd.toLocaleString()} (${RATES[cur]})`;
}

function checkUser() {
  if (!userName) {
    userName = prompt("請輸入你的名字：") || "我";
    localStorage.setItem('pwa_user_name', userName);
  }
  document.getElementById('user-display').innerText = `👤 ${userName}`;
}

function addRecord() {
  const item = document.getElementById('inp-item').value.trim();
  const oriAmt = parseFloat(document.getElementById('inp-amount').value);
  const cur = document.getElementById('inp-cur').value;
  const payer = document.getElementById('inp-payer').value;
  const split = document.getElementById('inp-split').value;
  const datetime = document.getElementById('inp-datetime').value;

  if (!item || isNaN(oriAmt) || !datetime) return;

  const twdAmt = +(oriAmt * RATES[cur]).toFixed(2);
  let shareMe = 0;
  if (split === 'half') shareMe = twdAmt / 2;
  else if (split === 'all-me') shareMe = twdAmt;
  else if (split === 'all-friend') shareMe = 0;

  records.unshift({ id: Date.now(), date: datetime, item, cur, oriAmt, twdAmt, payer, split, shareMe });
  saveAndRender();
  document.getElementById('inp-item').value = '';
  document.getElementById('inp-amount').value = '';
}

function saveAndRender() {
  localStorage.setItem('pwa_travel_v2', JSON.stringify(records));
  render();
}

function formatDateTime(datetimeStr) {
  const date = new Date(datetimeStr);
  return date.toLocaleString('zh-TW', { year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Taipei' });
}

function render() {
  checkUser();
  const logBody = document.getElementById('log-body');
  let myPaidSum = 0, mySpendSum = 0;

  logBody.innerHTML = records.map(r => {
    if (r.payer === 'me') myPaidSum += r.twdAmt;
    mySpendSum += r.shareMe;
    const splitMap = { half: '兩人平分', 'all-me': '全算我的', 'all-friend': '幫人墊款' };

    return `
      <div class="log-item">
        <div class="log-info">
          <div class="log-name">${r.item}</div>
          <div class="log-sub">${formatDateTime(r.date)} · ${r.payer==='me'?'你墊付':'夥伴付'} · ${r.cur} ${r.oriAmt.toLocaleString()}</div>
        </div>
        <div class="log-amount">
          <div class="amt-twd">$${Math.round(r.twdAmt).toLocaleString()}</div>
          <div class="amt-ori">${splitMap[r.split]}</div>
        </div>
        <button class="btn-del" onclick="deleteRecord(${r.id})">刪除</button>
      </div>
    `;
  }).join('');

  const net = myPaidSum - mySpendSum;
  const settle = document.getElementById('settle-summary');
  if (Math.abs(net) < 1) {
    settle.innerText = '✅ 已結清'; settle.style.color = 'var(--green)';
  } else {
    settle.innerText = net > 0 ? `夥伴還你 $${Math.round(net).toLocaleString()}` : `你還夥伴 $${Math.round(Math.abs(net)).toLocaleString()}`;
    settle.style.color = net > 0 ? 'var(--blue)' : 'var(--red)';
  }
  document.getElementById('m-total-paid').innerText = `$${Math.round(myPaidSum).toLocaleString()}`;
  document.getElementById('m-my-spend').innerText = `$${Math.round(mySpendSum).toLocaleString()}`;
  setDefaultDateTime();
}

function setDefaultDateTime() {
  const now = new Date();
  const eightHoursLater = new Date(now.getTime() + 8 * 60 * 60 * 1000);
  const datetime = eightHoursLater.toISOString().slice(0,16);
  document.getElementById('inp-datetime').value = datetime;
}

function exportToCSV() {
  if (records.length === 0) return alert("資料庫空空如也");
  const headers = ["日期", "項目", "原幣", "原幣金額", "台幣總額", "支付者", "分帳方式", "我的負擔"];
  const csvContent = "\uFEFF" + headers.join(",") + "\n" + 
    records.map(r => [
      formatDateTime(r.date), 
      `"${r.item.replace(/"/g, '""')}"`, // 處理逗號與引號
      r.cur, r.oriAmt, Math.round(r.twdAmt), 
      r.payer==='me'?'我':'夥伴', 
      r.split, Math.round(r.shareMe)
    ].join(",")).join("\n");

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `記帳_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
}

function deleteRecord(id) { if (confirm('刪除？')) { records = records.filter(r => r.id !== id); saveAndRender(); } }
function resetUserName() { const n = prompt("名字", userName); if (n) { userName = n; localStorage.setItem('pwa_user_name', n); render(); } }
render();
</script>
</body>
</html>
